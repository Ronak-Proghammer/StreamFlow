# ============================================================
# RabbitMQ Configuration
# ============================================================
# This file tunes RabbitMQ for our use case.
# In production you'd tune these based on load testing.
# ============================================================

# How long (ms) RabbitMQ waits before considering a consumer
# dead if it hasn't acknowledged a message.
# Default is 30 minutes — we set it lower for dev.
consumer_timeout = 60000

# Maximum number of messages held in memory before writing
# to disk (flow control). Lower = less RAM, more disk I/O.
vm_memory_high_watermark.relative = 0.4

# Allow connections from any host (fine for dev/Docker)
# In prod you'd restrict this to specific IPs.
loopback_users = none

# Enable these plugins (management UI is critical for debugging)
# Note: plugins are enabled via docker command or rabbitmq-plugins
# This config file handles non-plugin settings.

# Heartbeat interval (seconds) — how often the broker and
# clients ping each other to detect dead connections.
heartbeat = 60